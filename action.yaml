name: Setup Wasp Environment
description: Download Simba, SRL-T and WaspLib
author: Torwent
branding:
  icon: flag
  color: green

inputs:
  srlt:
    description: Wether to setup SRL-T or not. If wasplib is true this will be ignored.
    required: false
  wasplib:
    description: Wether to setup WaspLib or not. If this is true srlt will be ignored.
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup Simba
      run: |
        mkdir ./Simba
        curl --retry 5 -L -o ./Simba/Simba.exe https://github.com/Torwent/Simba/releases/download/Simba1400/Simba-Win32.exe
        mkdir ./Simba/Includes/
        mkdir ./Simba/Scripts/
      shell: bash

    - name: Setup SRL-T
      if: ${{ (inputs.wasplib == 'true') || (inputs.srlt == 'true') }}
      run: |
        cd ./Simba/Includes/
        git clone https://github.com/Torwent/SRL-T.git
      shell: bash

    - name: Setup WaspLib
      if: ${{ inputs.wasplib == 'true' }}
      run: |
        cd ./Simba/Includes/
        git clone https://github.com/Torwent/WaspLib.git
      shell: bash
